
# ============================================================
# JobRadar — DEVELOPMENT docker-compose
# Usage: docker compose -f docker-compose.dev.yml up
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobradar
      POSTGRES_PASSWORD: jobradar
      POSTGRES_DB: jobradar
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobradar -d jobradar"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app           # Hot reload — mounts source code
      - cv_data:/cv_data
    ports:
      - "8001:8000"              # Exposed directly in dev (8001 avoids conflicts)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=debug --concurrency=1
    env_file: .env
    volumes:
      - ./backend:/app
      - cv_data:/cv_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=debug
    env_file: .env
    volumes:
      - ./backend:/app
      - cv_data:/cv_data
    depends_on:
      - redis
      - celery-worker
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules          # keeps container node_modules isolated from host
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://fastapi:8000
    depends_on:
      - fastapi
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app_network

volumes:
  pg_data:
  cv_data:

networks:
  app_network:
    driver: bridge
